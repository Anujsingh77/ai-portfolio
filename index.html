    <!--
      GitHub Pages SPA redirect decoder.
      Works together with public/404.html so that deep links / refreshes on a
      GitHub Pages *project* subpath (username.github.io/repo/section) never
      show a blank white screen. Safe no-op on any other host.
      Credit: spa-github-pages technique (rafgraph).
    -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
